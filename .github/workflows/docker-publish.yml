name: Build and Publish Docker Image

# 触发条件：当你推送以 'v' 开头的 Tag 时触发 (例如: v1.0.0)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'


env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # 允许 GITHUB_TOKEN 推送镜像到 ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 最佳实践：设置 Docker Buildx，支持高级特性和外部缓存
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 自动登录到 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 【关键修复】：将仓库名转换为全小写
      # GitHub 仓库名是 SharpFort/SharpFort.Net，但 Docker 镜像名严格要求全小写
      - name: Downcase IMAGE_NAME
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 自动提取 Tag 并同时生成 latest 标签
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # 编译并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 【最佳实践】：弥补 Dockerfile 中 COPY . . 带来的缓存失效问题
          # 将构建缓存导出到 GitHub Actions 缓存中，极大加速后续依赖还原的速度
          cache-from: type=gha
          cache-to: type=gha,mode=max