[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
# g = 用户, 角色, 域
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# === 超管权限的双重保障机制 ===
# 1. 策略层：InitAdminPermissionAsync 写入 p, <admin>, <domain>, *, * 到 casbin_rule（启动时 + 全量迁移后自动维护）
# 2. 中间件层：CasbinAuthorizationMiddleware 读取 CasbinOptions.SuperAdminRoleCode，匹配则直接放行（F-08）
# 两者互补 — 策略层提供最小依赖的兜底，中间件层提供不依赖 DB 策略表的应急通道

# === 紧急恢复备份 ===
# 如果上述双重机制均失效导致超管被锁，取消下面注释并重启系统：
# m = g(r.sub, "admin", r.dom) || (g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*"))
# 注意：应急硬编码中的 "admin" 应与 CasbinOptions.SuperAdminRoleCode 保持一致

# === 当前生效：纯策略驱动 ===
# keyMatch2 用于处理 /api/user/:id 动态路由，p.act == "*" 支持 HTTP 方法通配
m = (g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*"))
