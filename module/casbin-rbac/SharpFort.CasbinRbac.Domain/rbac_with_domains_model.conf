[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
# g = 用户, 角色, 域
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# === 紧急恢复备份（B-03/B-04）：如策略表损坏导致超管被锁，取消注释并重启 ===
# m = g(r.sub, "sys-admin", r.dom) || (g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*"))

# === 当前生效：纯策略驱动 ===
# 超管权限由 InitAdminPermissionAsync 分配的 *, * 通配符策略控制，与策略表统一管理
# keyMatch2 用于处理 /api/user/:id 动态路由
m = (g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*"))
